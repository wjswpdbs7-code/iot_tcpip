 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플랙스 수평 정렬</title>
    <style>

        .container {
            display: flex; 
            background-color: gray;
            margin : 10px;
        }
        #option1 {
            justify-content: flex-start; /* 왼쪽 정렬 */
        }
        #option2 {
            justify-content: flex-end; /* 오른쪽 정렬 */
        }
        #option3 {
            justify-content: center; /* 가운데 정렬 */
        }
        #option4 {
            justify-content: space-around; /* 요소 주위에 균등한 간격 */
        }
        #option5 {
            justify-content: space-between; /* 양 끝 정렬, 사이 간격 균등 */
        }
        #option6 {
            justify-content: space-evenly; /* 요소 사이에 균등한 간격 */
        }
        .box {
            padding: 20px;
            margin: 10px;
            background-color: black;
            width: 100px;
        }
        .box p {        
        color: white;
        text-align: center;
        }
    </style>
 </head>
 <body>
    <div class="container" id="option1">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="option2">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="option3">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="option4">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="option5">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="option6">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>

 </body>
 </html>
