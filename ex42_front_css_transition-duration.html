 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전환 지속 시간</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            margin: 100px auto;
            background-color: blue;
            transition-property: width, height, border-radius;
            transition-duration: 5s, 1s, 5s; /* 전환 지속 시간을 5초로 설정 */
        }
        .box:hover { /*  */
            width: 500px;
            height: 500px;
            border-radius: 50px;
        }
    </style>
 </head>
 <body>
    <div class="box">
    <div>마우스를 올리면 5초 동안 크기가 커집니다.</div>   
    </div>

 </body>
 </html>

 클래스정의 할때의 방법들

 div id = "ex" 

 div class = "box"

 id 는 고유한 요소에 사용되고, class는 여러 요소에 적용할 수 있습니다.

 예를들어 <div id = "ex">
    <div class = "box box1">...</div>
    <div class = "box box2">...</div>
    <div class = "box box3">...</div>
    <div class = "box box4">...</div>
    <div class = "box box5">...</div>
    </div>

    이경우 box1, box2, box3, box4, box5는 모두 "box" 클래스를 공유하지만 각각의 고유한 스타일을 가질 수 있습니다.
