<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1> Unordered list - UL : 내가 좋아하는 야식 순위 </h1>
    <ul>
        <li> 치킨 </li>
        <li> 생라면 </li>
        <li> 썬칩 </li>
    </ul>

        <h1> Ordered list - OL : 내가 좋아하는 야식 순위 </h1>
    <ol>
        <li> 치킨 </li>
        <li> 생라면 </li>
        <li> 썬칩 </li>
    </ol>
    
</body>
