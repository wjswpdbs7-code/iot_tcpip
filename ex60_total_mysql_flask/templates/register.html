{% extends "base.html" %}
{% block title %}회원 가입{% endblock %}
{% block content %}
<h2>회원 가입</h2>
<form id="regForm">
    <input type="text" id="name" placeholder="사용자 이름" required>
    <input type="text" id="address" placeholder="주소">
    <input type="text" id="phone" placeholder="전화번호">
    <input type="password" id="password" placeholder="비밀 번호" required>
    <button type="submit">가입 완료</button>
</form>
<p>ID/PW가 생각 났나요? <a href="/">로그인 하러가기</a></p>
<script> 
    document.getElementById('regForm').addEventListener
    ('submit', async (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('name').value,
            address: document.getElementById('address').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value
        };
        const response = await fetch('/api/register', { // AJAX(예전에 쓰던거) <---> Fetch API(최근에 사용), AXIOS(가장 최근)는 라이브러리 관리를 잘해야 호환성 문제가 없음 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await response.json();
        if (response.ok && result.success) {
            alert(result.message);
            window.location.href = '/';
        } else {
            alert('회원 가입 실패');
        }
    } 
);
</script>
{% endblock %}
