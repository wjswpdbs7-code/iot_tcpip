{% extends 'base.html' %}

{% block title %}나의 주문 내역{% endblock %}

{% block content %}
<h2>나의 주문 내역</h2>
<table border="1" style="width: 100%; text-align: center; border-collapse: collapse; border-color: #ddd;">
    <thead>
        <tr style="background: #f2f2f2; height: 40px;">
            <th>주문 날짜</th>
            <th>도서명</th>
            <th>결제 금액</th>
        </tr>
    </thead>
    <tbody id="orderList">
        <tr><td colspan="3" style="padding: 20px;">주문 내역을 불러오는 중...</td></tr>
    </tbody>
</table>

<script>
    async function loadOrders() {
        const res = await fetch('/api/my_orders');
        const orders = await res.json();
        const container = document.getElementById('orderList');
        
        if(orders.length === 0) {
            container.innerHTML = '<tr><td colspan="3" style="padding: 20px;">주문하신 내역이 없습니다.</td></tr>';
            return;
        }

        container.innerHTML = orders.map(order => {
            // 날짜 문자열 포맷팅 처리 (UTC 시간 변환 대응)
            const date = new Date(order.orderdate).toLocaleDateString('ko-KR');
            return `
                <tr style="height: 45px;">
                    <td>${date}</td>
                    <td style="text-align: left; padding-left: 15px;"><strong>${order.bookname}</strong></td>
                    <td style="color: #dc3545; font-weight: bold;">${order.saleprice}원</td>
                </tr>
            `;
        }).join('');
    }
    loadOrders();
</script>
{% endblock %}
