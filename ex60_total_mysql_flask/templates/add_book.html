{% extends 'base.html' %}

{% block title %}도서 등록{% endblock %}

{% block content %}
<h2>신규 도서 등록 (관리자용)</h2>
<form id="addBookForm">
    <input type="text" id="bookname" placeholder="도서명" required>
    <input type="text" id="publisher" placeholder="출판사">
    <input type="number" id="price" placeholder="가격" required>
    <button type="submit">등록하기</button>
</form>

<script>
    document.getElementById('addBookForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            bookname: document.getElementById('bookname').value,
            publisher: document.getElementById('publisher').value,
            price: document.getElementById('price').value
        };
        //한단어씩 설명:  document.getElementById('addBookForm') -> HTML 폼 요소(addBookForm이란 id를 가진 요소)를 선택
        //
        
        const res = await fetch('/api/add_book', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if(res.ok) {
            alert('새 도서가 정상적으로 등록되었습니다!');
            location.href = '/books';
        } else {
            alert('도서 등록 실패');
        }
    });
</script>
{% endblock %}
