 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플렉스 디렉션</title>
    <style>
        .container {
            display: flex;
            width: 800px;
            background-color: gray;
            border: 1px solid white;
        }
        .box {
            width: 100px;
            height: 50px;
            background-color: tomato;
            margin: 10px;
        }
        #option1 {
            flex-direction: row;
        }
        #option2 {
            flex-direction: row-reverse;
        }
        #option3 {
            flex-direction: column;
        }

        </style>
 </head>
 <body>
    <div class="container" id="option1">
        <div class="box" id="box"><p>1</p></div>
        <div class="box" id="box"><p>2</p></div>
        <div class="box" id="box"><p>3</p></div>
    </div>
    <div class="container" id="option2">
        <div class="box" id="box"><p>1</p></div>
        <div class="box" id="box"><p>2</p></div>
        <div class="box" id="box"><p>3</p></div>
    </div>
    <div class="container" id="option3">
        <div class="box" id="box"><p>1</p></div>
        <div class="box" id="box"><p>2</p></div>
        <div class="box" id="box"><p>3</p></div>
    </div>
 </body>
 </html>

 이 방식은 플렉스 디렉션을 이용하여 아이템의 방향을 설정하는 방법입니다. 
<br
 row는 기본값으로 왼쪽에서 오른쪽으로 아이템이 배치되고, 

 row-reverse는 오른쪽에서 왼쪽으로 아이템이 배치됩니다. 

 column은 위에서 아래로 아이템이 배치됩니다.
