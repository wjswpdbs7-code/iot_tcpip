<!-- ex23_front_html_table.html -->

<!-- 테이블은 표 형태로 데이터를 표현하는 태그입니다. -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <table>
        <tr><td>1</td><td>2</td></tr>
        <tr><td>3</td><td>4</td></tr>
        <tr><td>5</td><td>6</td></tr>
    </table>
    <table>
        <caption> 첫 표</caption>
        <thead>
            <tr>
                <th>컬럼이름1</th>
                <th>컬럼이름2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1행 1열</td>
                <td>1행 2열</td>
            </tr>
                        <tr>
                <td>2행 1열</td>
                <td>2행 2열</td>
            </tr>
                
            </tbody>
        </thead>
    </table>
    <table>
        <caption> table row span </caption>
            <tr>
                <td>1-1</td> <td>1-2</td> <td>1-3</td> <td>1-4</td>
            </tr>
            <tr>
                <td>2-1</td> <td rowspan="2"style="border: solid 1px black">2-2</td> <td>2-3</td> <td>2-4</td> <!-- rowspan : 해당 열이 행을 x개만큼 사용(병합) -->
            </tr>
            <tr>
                <td>3-1</td>
                <!-- <td>3-2</td>  -->
                <td>3-3</td> 
                <td>3-4</td>
            </tr>
    </table>

        <table style="border: solid 1px black">
        <caption> table cols span </caption>
            <tr>
                <td>1-1</td> <td>1-2</td> <td>1-3</td> <td>1-4</td>
            </tr>
            <tr>
                <td>2-1</td> 
                <td colspan="3"style="border: solid 1px black">2-2</td>
                <!-- <td>2-3</td>
                <td>2-4</td> colspan : 해당 열이 열을 x개만큼 사용(병합) -->
            </tr>
            <tr>
                <td>3-1</td>
                <td>3-2</td> 
                <td>3-3</td> 
                <td>3-4</td>
            </tr>
    </table>
 </body>
 </html>
