<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블</title>
    <style>
        table{
            border-collapse: collapse; /* 테이블의 경계선이 겹치지 않도록 설정 */
            caption-side: bottom; /* caption의 위치를 테이블의 아래로 설정 */
            border : 1px solid black; /* 테이블 전체에 검은색 실선 테두리를 적용 */
            min-width: 200px; /* 테이블의 최소 너비를 200픽셀로 설정 */
        }
        th, td{
            border: 1px solid black; /* th와 td 요소에 검은색 실선 테두리를 적용 */
        }
</style>
</head>
<body>
    테이블: 표 형태로 데이터를 표현할 때 사용하는 태그. <br>

    <table>
        <caption>표 1 테스트용 표</caption>
        <thead>
            <tr><th>컬럼1</th><th>컬럼2</th></tr>
        </thead>
        <tbody>
            <tr><td>내용1-1</td><td>내용2-1</td></tr>
            <tr><td>내용1-2</td><td>내용2-2</td></tr>
        </tbody>
    </table>
</body>
</html>
