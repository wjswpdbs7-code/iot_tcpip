 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ex34_front_css_form_style_login.css">
 </head>
 <body>
    <form class = "login1">
        <fieldset> 
            <legend>로그인 정보</legend>
            <ul>
                <li>
                    <label for="userid">아이디</label>
                    <input id = "userid" name="userid" type="text" required>
                </li>
                <li>
                    <label for="pw1">비밀번호</label>
                    <input id="pw1" name="pw1" type="password" required>
                </li>
                <li>
                    <label for="pw2">비밀번호 확인</label>
                    <input id="pw2" name="pw2" type="password" required>
                </li>
                <li>
                    <label for="level">회원등급</label>
                    <input id="level" name="level" type="text" value="준회원" readonly>
                </li>
            </ul>
        </fieldset> 

        <fieldset>
            <legend>개인 정보</legend>
        </fieldset>

        <fieldset>
            <button type="submit">제출</button>
        </fieldset>
    </form>
    
    <div>안녕하세요</div>
    
    <p>안녕하세요</p>
    
</body>
</html>
