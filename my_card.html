<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>my_card</title>
        <style>
        .container {
            display: flex; 
            background-color: gray;
            margin : 10px;
        }
        .cat_list {
            list-style: none;
            justify-content: flex-start;
        }
        div{
            position: relative;
        }
        img {
            width: 200px;
            height: 200px;
        }
        div.caption {
            width: 200px;
            height: 200px;
            text-align: center;
            display: flex;/*이건 플렉스 컨테이너로 만들어 주는데 플렉스 컨테이너란 : 요소들을 일렬로 배치해주는 레이아웃 방식 */
            flex-direction: column;/* 요소들을 세로로 배치 */
            justify-content: center;/* 요소들을 수직으로 가운데 정렬 */
            align-items: center;/* 요소들을 수평으로 가운데 정렬 */
            /* opacity: 0; */
        }
        </style>
    </head>
    <body>
        <h1 id = "title">원하는 고양이를 골라주세용</h1>
        <h2 id = "sub_title">입양 가능 목록</h2>
        <div class = "container">
            <ul class = "cat_list">
                <li class = "card">
                        <img src = "img/angry_cat.jpg" name="angry_img">
                    <div class = "caption">
                        <h1>빡친 고양이</h1>
                        <p>사료를 다오</p>
                    </div>
                </li>

                <li class = "card">
                    <img src = "img/ddabong_cat.jpg">
                    <div class = "caption" name = "ddabong_img">
                        <h1>따봉 고양이</h1>
                        <p>따봉을 주세용</p>
                    </div>
                </li>
                <li class = "card">
                    <img src = "img/oioi_cat.jpg" name = "oioi_img">
                    <div class = "caption" name = "oioi_caption">
                        <h1>oioi 고양이</h1>
                        <p>oioi!!</p>

                    </div>
                </li>
            </ul>
        </div>
    </body>
</html>
